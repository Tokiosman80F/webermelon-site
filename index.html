<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <nav class="navbar">
          <!-- logo -->
          <a href="" class="nav__logo">
            <img src="assets/img/logo.svg" alt="logo" />
          </a>

          <!-- nav item -->
          <ul class="nav__list">
            <li class="nav__item nav__link-active">
              <a href="#" class="nav__link">Home</a>
            </li>
            <li class="nav__item"><a href="#" class="nav__link">About</a></li>
            <li class="nav__item">
              <a href="#" class="nav__link">Services</a>
            </li>
            <li class="nav__item">
              <a href="#" class="nav__link">Porfolio</a>
            </li>
            <li class="nav__item"><a href="#" class="nav__link">Contact</a></li>
          </ul>
          <!-- cta btn -->
          <button class="nav__cta">
            <img
              class="nav__cta-icon"
              src="assets/icons/call-icon.svg"
              alt="call icon"
            />
            <span class="nav__cta-text">Let's Talk</span>
          </button>
        </nav>
      </div>
    </header>

    <section class="hero">
      <div class="container">
        <!--  -->
        <div class="hero__content">
          <h1 class="hero__title">
            Design That <br />
            Inspires & Delights
          </h1>
          <div class="hero__subtitles">
            <p>(Hero Section)</p>

            <div class="hero__cta">
              <img
                class="hero__arrow-icon"
                src="assets/icons/arrow-down-icon.svg"
                alt=""
              />
              <a class="hero__link" href="#">Learn More</a>
            </div>
          </div>
        </div>
        <!-- Hero image -->
        <div class="hero__image">
          <img class="hero__img" src="assets/img/hero.png" alt="hero img" />
        </div>
      </div>
    </section>

    <section class="design-process">
      <div class="container design-process__container">
        <h2 class="design-process__heading">
          We Use Design Tools <br />That Deliver Excellence
        </h2>

        <div class="process__layout">
          <!-- row 1 -->
          <div class="card w-624">
            <div class="proccess__card">
              <div class="proccess__card-content">
                <h1 class="proccess__card-heading">
                  We work with globally trusted design software and
                  technologies.
                </h1>

                <img
                  class="process__card-img"
                  src="assets/icons/arrow-up-white-icon.svg"
                  alt=""
                />
              </div>
              <div class="proccess__card-content2">
                <a class="proccess__card-link" href="#">More About</a>
              </div>
            </div>
          </div>

          <div class="card w-592">
            <img class="card-img" src="assets/img/deliver-img-1.png" alt="" />
          </div>

          <!-- row 2 -->
          <div class="card w-284">Card 3</div>

          <div class="card w-284">
            <img class="card-img" src="assets/img/deliver-img-2.png" alt="" />
          </div>

          <div class="card w-624">Card 5</div>
        </div>
      </div>
    </section>
  </body>
</html>
